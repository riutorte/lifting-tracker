<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1220">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Lifting Tracker</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./assets/icon-192.png">
  <link rel="icon" href="./assets/icon-192.png" type="image/png">
  <link rel="stylesheet" href="./css/app.css">
</head>
<body>
  <header class="app-header">
    <h1 id="tab-title">Overview</h1>
  </header>

  <main id="app">
    <section id="tab-overview" class="tab active" aria-labelledby="tab-title">
      <div class="loading">Loading your log…</div>
    </section>
    <section id="tab-history" class="tab" hidden></section>
    <section id="tab-log" class="tab" hidden></section>
  </main>

  <nav class="tabbar" aria-label="Primary">
    <button class="tab-btn active" data-tab="overview" aria-label="Overview">
      <span class="tab-icon">📊</span>
      <span class="tab-label">Overview</span>
    </button>
    <button class="tab-btn" data-tab="history" aria-label="History">
      <span class="tab-icon">📅</span>
      <span class="tab-label">History</span>
    </button>
    <button class="tab-btn" data-tab="log" aria-label="Log workout">
      <span class="tab-icon">✏️</span>
      <span class="tab-label">Log</span>
    </button>
  </nav>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
